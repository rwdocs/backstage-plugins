app:
  title: RW Docs Dev
  baseUrl: http://localhost:3000

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  auth:
    dangerouslyDisableDefaultAuthPolicy: true
  database:
    client: better-sqlite3
    connection:
      # Persist the dev DB between runs (catalog, search index, …) instead of
      # rebuilding from scratch on every start. Resolved relative to the backend
      # process cwd (packages/backend), so ../../ points at the repo root.
      # Backstage writes one <pluginId>.sqlite file per plugin in this directory.
      # Remove the directory (rm -rf .data) for a clean database.
      directory: ../../.data
  cors:
    origin: http://localhost:3000
    credentials: true

auth:
  providers:
    guest: {}
    alice: {}
    bob: {}

catalog:
  rules:
    - allow: [Component, Domain, System, Location, User, Group]
  locations:
    - type: file
      target: ../../examples/entities.yaml

rw:
  projectDir: ${RW_PROJECT_DIR}

notifications:
  # Pre-declare the doc-comment topics so all three toggles appear in
  # Settings → Notifications immediately (Backstage otherwise only lists a topic
  # after the first notification carrying it is received). Origin id "plugin:rw"
  # is the rw plugin's service-principal subject. Default-on (opt-out model):
  # users disable individual topics in the UI.
  defaultSettings:
    channels:
      - id: Web
        enabled: true
        origins:
          - id: plugin:rw
            enabled: true
            topics:
              - id: comment:thread:created
                enabled: true
              - id: comment:reply:created
                enabled: true
              - id: comment:thread:resolved
                enabled: true
